[editor]
animations            = false
relative_line_numbers = true

[colors]
white  = "#ABB2BF"
black  = "#1E2128"
blue   = "#62AEEF"
grey   = "#32363D"
green  = "#98C379"
red    = "#E06B74"
yellow = "#E5C07A"
purple = "#C778DD"

[theme]
ident               = "white"
cursor.fg           = "black"
cursor.bg           = "white"
cursor_secondary.fg = "black"
cursor_secondary.bg = "#ABB2BFAA"
selection.bg        = "grey"
keyword             = "blue"
function            = "blue"
comment.fg          = "white"
comment.bg          = "grey"
string              = "green"
number              = "red"
directive           = "red"
constant            = "red"
operator            = "red"
type                = "yellow"
background.bg       = "black"

indicator_normal.bg = "blue"
indicator_normal.fg = "black"
indicator_visual.bg = "purple"
indicator_visual.fg = "black"
indicator_insert.bg = "green"
indicator_insert.fg = "black"

[leader.goto]
g = go-to-line
e = go-to-file-end
h = go-to-line-start
l = go-to-line-end
s = go-to-line-start-non-whitespace

[leader.space]
f = open-file
k = show-hover-information
a = show-code-actions

[leader.match-inside]
w   = match-in-word
S-w = match-in-long-word
p   = match-in-paragraph
g   = match-in-change

[leader.match]
m = go-to-matching
i = leader.match-inside

[leader.case]
grave_accent = case-swap
l            = case-to-lower
u            = case-to-upper
c            = case-to-caml
p            = case-to-pascal
s            = case-to-snake
S-s          = case-to-screaming-snake

[keybinds.normal]
h            = character-left
j            = character-down
k            = character-up
l            = character-right
f            = find
S-f          = find-backward
v            = visual
w            = select-word-forward
e            = select-word-end-forward
b            = select-word-backward
S-w          = select-long-word-forward
S-e          = select-long-word-end-forward
S-b          = select-long-word-backward
r            = replace
d            = delete
i            = insert
a            = append
S-a          = go-to-line-end,character-right,insert
S-i          = go-to-line-start-non-whitespace,insert
o            = open-below
c            = change
S-o          = open-above
C-o          = open-file
C-d          = view-half-page-down
C-u          = view-half-page-up
m            = leader.match
g            = leader.goto
space        = leader.space
S-comma      = outdent
S-period     = indent
slash        = search
S-semicolon  = command
comma        = keep-primary-selection
semicolon    = collapse-selection
S-c          = create-selection-below
grave_accent = leader.case
S-5          = select-all
x            = select-line
A-semicolon  = flip-selection
S-k          = keep-selections
s            = select
y            = yank
p            = paste

[keybinds.insert]
backspace = character-left,delete
delete    = delete
enter     = insert-newline,character-right
tab       = insert-tab,character-right

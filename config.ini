[editor]
animations            = false
relative_line_numbers = true

[colors]
white  = "#ABB2BF"
black  = "#1E2128"
blue   = "#62AEEF"
grey   = "#32363D"
green  = "#98C379"
red    = "#E06B74"
yellow = "#E5C07A"
purple = "#C778DD"

[theme]
ident         = "white"
cursor.fg     = "black"
cursor.bg     = "white"
keyword       = "blue"
function      = "blue"
comment.fg    = "white"
comment.bg    = "grey"
string        = "green"
number        = "red"
directive     = "red"
constant      = "red"
operator      = "red"
type          = "yellow"
background.bg = "black"

indicator_normal.bg = "blue"
indicator_normal.fg = "black"
indicator_visual.bg = "purple"
indicator_visual.fg = "black"
indicator_insert.bg = "green"
indicator_insert.fg = "black"

[keybinds.normal]
"h" = "character-left"
"j" = "character-down"
"k" = "character-up"
"l" = "character-right"

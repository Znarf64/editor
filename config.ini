[editor]
animations            = false
relative_line_numbers = true

[colors]
white  = "#ABB2BF"
black  = "#1E2128"
blue   = "#62AEEF"
grey   = "#32363D"
green  = "#98C379"
red    = "#E06B74"
yellow = "#E5C07A"
purple = "#C778DD"

[theme]
ident         = "white"
cursor.fg     = "black"
cursor.bg     = "white"
keyword       = "blue"
function      = "blue"
comment.fg    = "white"
comment.bg    = "grey"
string        = "green"
number        = "red"
directive     = "red"
constant      = "red"
operator      = "red"
type          = "yellow"
background.bg = "black"

indicator_normal.bg = "blue"
indicator_normal.fg = "black"
indicator_visual.bg = "purple"
indicator_visual.fg = "black"
indicator_insert.bg = "green"
indicator_insert.fg = "black"

[leader.goto]
g = go-to-line
e = go-to-file-end
h = go-to-line-start
l = go-to-line-end
s = go-to-line-start-non-whitespace

[leader.space]
f = open-file

[leader.match-inside]
w = match-in-word
p = match-in-paragraph

[leader.match]
m = go-to-matching
i = leader.match-inside

[keybinds.normal]
h        = character-left
j        = character-down
k        = character-up
l        = character-right
f        = find
v        = visual
w        = select-word-forward
e        = select-word-end-forward
b        = select-word-backward
r        = replace
d        = delete
i        = insert
S-i      = insert-at-line-start
a        = insert-after
S-a      = insert-at-line-end
o        = open-below
c        = change
S-o      = open-above
C-o      = open-file
C-d      = view-half-page-down
C-u      = view-half-page-up
m        = leader.match
g        = leader.goto
space    = leader.space
S-comma  = outdent
S-period = indent

[keybinds.insert]
backspace = character-left,delete
delete    = delete
enter     = insert-newline,character-right
tab       = insert-tab,character-right

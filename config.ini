[editor]
animations            = false
relative_line_numbers = true
[theme]
ident         = "#ABB2BF"
cursor.fg     = "#1E2128"
cursor.bg     = "#ABB2BF"
keyword       = "#62AEEF"
function      = "#62AEEF"
comment.fg    = "#ABB2BF"
comment.bg    = "#32363D"
string        = "#98C379"
number        = "#E06B74"
directive     = "#E06B74"
constant      = "#E06B74"
operator      = "#E06B74"
type          = "#E5C07A"
background.bg = "#1E2128"
[keybinds.normal]
